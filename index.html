<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" href="media/me-gusta.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>La Mejor Casualidadd</title>

    <style>
        body {
            margin: 0;
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #ffd6e0, #e0c3fc);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        h1 {
            color: #fff;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            font-size: clamp(2rem, 6vw, 2.8em);
            margin-bottom: 20px;
            animation: fadeIn 3s ease-in-out;
            text-align: center;
            z-index: 2;
        }

        .main-photo {
            width: min(80vw, 300px);
            height: min(80vw, 300px);
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.3);
            z-index: 2;
            animation: pulse 5s infinite;
        }

        .decor {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 15px;
            object-fit: cover;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
            animation: float 6s ease-in-out infinite;
        }

        /* Posiciones desktop */
        .img1 {
            top: 10%;
            left: 10%;
        }

        .img2 {
            top: 15%;
            right: 15%;
        }

        .img3 {
            bottom: 20%;
            left: 15%;
        }

        .img4 {
            bottom: 10%;
            right: 20%;
        }

        .img5 {
            top: 50%;
            left: 70%;
        }

        /* Tablet y móvil */
        @media (max-width: 768px) {

            .decor {
                width: 75px;
                height: 75px;
            }

            .img1 {
                top: 5%;
                left: 2%;
            }

            .img2 {
                top: 8%;
                right: 2%;
            }

            .img3 {
                bottom: 20%;
                left: 2%;
            }

            .img4 {
                bottom: 12%;
                right: 2%;
            }

            .img5 {
                top: 45%;
                right: 2%;
                left: auto;
            }
        }

        /* iPhone pequeño */
        @media (max-width: 480px) {

            h1 {
                margin-top: 40px;
            }

            .decor {
                width: 55px;
                height: 55px;
            }

            .img1 {
                top: 3%;
                left: 1%;
            }

            .img2 {
                top: 4%;
                right: 1%;
            }

            .img3 {
                bottom: 18%;
                left: 1%;
            }

            .img4 {
                bottom: 10%;
                right: 1%;
            }

            .img5 {
                top: 40%;
                right: 1%;
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background-color: #ff9eb5;
            color: white;
            font-size: 1em;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0px 5px 10px rgba(0,0,0,0.2);
            transition: background 0.3s;
            z-index: 2;
        }

        .btn:hover {
            background-color: #ff82a0;
        }

        /* corazones flotando */
        .heart {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: rgba(255, 0, 85, 0.7);
            transform: rotate(45deg);
            animation: floatUp 8s linear infinite;
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: rgba(255, 0, 85, 0.7);
            border-radius: 50%;
        }

        .heart::before {
            top: -10px;
            left: 0;
        }

        .heart::after {
            left: -10px;
            top: 0;
        }

        @keyframes floatUp {
            from {
                transform: translateY(100vh) rotate(45deg);
                opacity: 1;
            }
            to {
                transform: translateY(-10vh) rotate(45deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <h1>LA MEJOR "CASUALIDADD"</h1>

    <img src="media/principal.jpg"
         alt="Foto principal"
         class="main-photo">

    <!-- Fotos decorativas -->
    <img src="media/img1.png" class="decor img1">
    <img src="media/img2.png" class="decor img2">
    <img src="media/img3.png" class="decor img3">
    <img src="media/img4.png" class="decor img4">
    <img src="media/img5.png" class="decor img5">

    <!-- Botón -->
    <button class="btn" onclick="playMusic()">
        Reproducir música jijij
    </button>

    <!-- Audio -->
    <audio id="song" src="media/musica.mp3"></audio>

    <script>
        function playMusic() {
            const audio = document.getElementById("song");
            audio.currentTime = 27;
            audio.play();
        }

        // Generar corazones flotando
        function createHeart() {
            const heart = document.createElement('div');

            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration =
                (5 + Math.random() * 5) + 's';

            document.body.appendChild(heart);

            setTimeout(() => heart.remove(), 10000);
        }

        setInterval(createHeart, 500);
    </script>

</body>
</html>
